<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #1e293b;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
        }

        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-header h2 {
            margin: 10px 0;
            color: #1e293b;
        }

        .info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
        }

        .info-box label {
            font-weight: bold;
            color: #475569;
        }

        .info-box p {
            margin: 5px 0 0;
            color: #1e293b;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div>Smart Attendance System</div>
    <div>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'history' %}">History</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<div class="container">
    <div class="profile-card">
        <div class="profile-header">
            <h2>{{ student.name }}</h2>
            <p>{{ student.department }} - Year {{ student.year }}</p>
        </div>

        <div class="info">
            <div class="info-box">
                <label>Roll Number</label>
                <p>{{ student.roll_number }}</p>
            </div>

            <div class="info-box">
                <label>Username</label>
                <p>{{ request.user.username }}</p>
            </div>

            <div class="info-box">
                <label>RFID UID</label>
                <p>{{ student.rfid_uid }}</p>
            </div>

            <div class="info-box">
                <label>Status</label>
                <p style="color:green;">Active</p>
            </div>
        </div>

        <a href="{% url 'dashboard' %}" class="btn">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
