<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2a5298;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #2a5298;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #1e3c72;
        }

        .message {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #2a5298;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Student Registration</h2>

    <!-- Display Django Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="message 
                {% if message.tags == 'error' %}error{% endif %}
                {% if message.tags == 'success' %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" name="roll" required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text" name="dept" required>
        </div>

        <div class="form-group">
            <label>Year</label>
            <select name="year" required>
                <option value="">Select Year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
            </select>
        </div>

        <div class="form-group">
            <label>RFID UID</label>
            <input type="text" name="uid" required>
        </div>

        <button type="submit" class="btn">Register Student</button>
    </form>

    <div class="login-link">
        Already registered? <a href="{% url 'login' %}">Login here</a>
    </div>
</div>

</body>
</html>
