{% extends "includes/base.html" %}

{% block content %}

<div class="max-w-lg mx-auto mt-12 bg-white text-black p-8 rounded-xl shadow-lg">

    <h2 class="text-2xl font-bold mb-6 text-center">
        Register User
    </h2>

    <form id="userForm" method="post" class="space-y-4">
        {% csrf_token %}

        <!-- Django Form Fields -->
        <div class="space-y-3">
            {{ form.as_p }}
        </div>

        <!-- RFID Section -->
        <div>
            <label class="block font-semibold mb-1">RFID</label>

            <div class="flex gap-2">
                <input type="text" id="rfidDisplay" readonly
                       placeholder="Click 'Get RFID'"
                       class="w-full px-3 py-2 border rounded-lg bg-gray-100">

                <button type="button" id="getRfidBtn"
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    Scan
                </button>
            </div>

            <input type="hidden" name="rfid" id="rfidField">
        </div>

        <!-- Submit Button -->
        <button type="submit"
                class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition">
            Submit
        </button>

    </form>

</div>

<!-- 🔷 Script -->
<script>
    const getBtn = document.getElementById("getRfidBtn");

    getBtn.addEventListener("click", async function () {
        const display = document.getElementById("rfidDisplay");
        const hidden = document.getElementById("rfidField");

        display.value = "Scanning...";

        try {
            const response = await fetch("/api/get-rfid/");
            const data = await response.json();

            if (data.rfid) {
                display.value = data.rfid;
                hidden.value = data.rfid;
            } else {
                display.value = "Not available";
                hidden.value = "";
            }
        } catch (error) {
            console.error(error);
            display.value = "Error fetching RFID";
        }
    });
</script>

{% endblock %}
